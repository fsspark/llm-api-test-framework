name: LLM Test Framework CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run nightly at 02:00 UTC with live tests enabled
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      run_live_tests:
        description: 'Run live API tests (requires secrets)'
        required: false
        default: false
        type: boolean

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION: 'LLMTestFramework.sln'

jobs:
  # ─── Build & Static Analysis ──────────────────────────────────────────────
  build:
    name: Build & Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build (no warnings tolerated)
        run: dotnet build ${{ env.SOLUTION }} --no-restore --configuration Release -warnaserror

  # ─── Contract & Schema Tests (no API key needed) ─────────────────────────
  contract-tests:
    name: Contract Tests (Mock/Schema)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore & Build
        run: |
          dotnet restore ${{ env.SOLUTION }}
          dotnet build ${{ env.SOLUTION }} --no-restore --configuration Release

      - name: Run Contract Tests (offline)
        run: |
          dotnet test src/LLMTestFramework.Tests/LLMTestFramework.Tests.csproj \
            --filter "Category=Contract" \
            --configuration Release \
            --logger "trx;LogFileName=contract-results.trx" \
            --results-directory ./test-results \
            -- TestRunParameters.Parameter\(name=\"RUN_LIVE_TESTS\",\ value=\"false\"\)
        env:
          RUN_LIVE_TESTS: "false"

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Contract Test Results
          path: ./test-results/contract-results.trx
          reporter: dotnet-trx

  # ─── Live API Tests (with secrets, manual or nightly) ────────────────────
  live-api-tests:
    name: Live API Tests
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_live_tests == true) ||
      github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore & Build
        run: |
          dotnet restore ${{ env.SOLUTION }}
          dotnet build ${{ env.SOLUTION }} --no-restore --configuration Release

      - name: Run All Tests (Live)
        run: |
          dotnet test src/LLMTestFramework.Tests/LLMTestFramework.Tests.csproj \
            --configuration Release \
            --logger "trx;LogFileName=live-results.trx" \
            --results-directory ./test-results \
            --collect:"XPlat Code Coverage"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUN_LIVE_TESTS: "true"

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history

      - name: Publish Allure Report
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-test-results
          path: |
            ./test-results/
            ./allure-results/
          retention-days: 30

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Live API Test Results
          path: ./test-results/live-results.trx
          reporter: dotnet-trx

      - name: Generate Coverage Report
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool 2>/dev/null || true
          reportgenerator \
            -reports:"./test-results/**/coverage.cobertura.xml" \
            -targetdir:"coverage-report" \
            -reporttypes:Html

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage-report/
